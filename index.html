<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fount</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .legend { position: absolute; top: 20px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.8); color: white; padding: 12px; border-radius: 8px; font-size: 14px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); }
        .legend-title { font-weight: bold; margin-bottom: 8px; font-size: 16px; color: #fff; }
        .legend-item { display: flex; align-items: center; margin-bottom: 8px; }
        .legend-item:last-child { margin-bottom: 0; }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; }
        .dot.working { background: #34C759; }
        .dot.broken { background: #FF3B30; }
        .dot.unverified { background: #8E8E93; }
        .popup-content { color: #333; min-width: 200px; }
        .popup-content h3 { margin: 0 0 12px 0; font-size: 16px; font-weight: 600; }
        .popup-content select, .popup-content input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; background: #f9f9f9; }
        .popup-content button { width: 100%; padding: 12px; background: #007AFF; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; transition: background 0.2s; }
        .popup-content button:active { background: #0056b3; }
        .leaflet-popup-content-wrapper { border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="legend">
        <div class="legend-title">Fount</div>
        <div class="legend-item"><div class="dot working"></div>Working</div>
        <div class="legend-item"><div class="dot broken"></div>Broken</div>
        <div class="legend-item"><div class="dot unverified"></div>Unverified</div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://codytbjaoqezsvieudro.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvZHl0Ymphb3FlenN2aWV1ZHJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDU0OTAsImV4cCI6MjA4OTk4MTQ5MH0.QapJ1Se1zwyGYqD2BO0okwfOMubUUGbRUFCN63z5ZfA';
        const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const map = L.map('map', { zoomControl: false }).setView([36.1627, -86.7816], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        const markers = {};

        function getColor(status) {
            if (status === 'working') return '#34C759';
            if (status === 'broken') return '#FF3B30';
            return '#8E8E93';
        }

        async function loadFountains() {
            const { data, error } = await dbClient.from('fountains').select('*');
            if (error) {
                console.error('Error loading fountains:', error);
                return;
            }

            data.forEach(f => {
                if (!f.lat || !f.lng) return;
                
                const color = getColor(f.status);
                
                const marker = L.circleMarker([f.lat, f.lng], {
                    radius: 8,
                    fillColor: color,
                    color: '#ffffff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.9
                }).addTo(map);

                marker.on('click', () => {
                    const popupHtml = `
                        <div class="popup-content">
                            <h3>${f.name || 'Water Fountain'}</h3>
                            <select id="status-${f.id}">
                                <option value="unverified" ${f.status === 'unverified' ? 'selected' : ''}>Unverified</option>
                                <option value="working" ${f.status === 'working' ? 'selected' : ''}>Working</option>
                                <option value="broken" ${f.status === 'broken' ? 'selected' : ''}>Broken</option>
                            </select>
                            <input type="text" id="note-${f.id}" placeholder="Add a note..." value="${f.note || ''}">
                            <button onclick="syncFountain('${f.id}')">Sync to Cloud</button>
                        </div>
                    `;
                    marker.bindPopup(popupHtml).openPopup();
                });

                markers[f.id] = marker;
            });
        }

        window.syncFountain = async function(id) {
            const status = document.getElementById(`status-${id}`).value;
            const note = document.getElementById(`note-${id}`).value;
            const btn = document.querySelector(`.popup-content button`);
            
            btn.innerText = 'Syncing...';
            btn.disabled = true;

            const { error } = await dbClient
                .from('fountains')
                .update({ status, note, updated_at: new Date().toISOString() })
                .eq('id', id);

            if (error) {
                alert('Sync failed. Check connection.');
                btn.innerText = 'Sync to Cloud';
                btn.disabled = false;
            } else {
                btn.innerText = 'Synced!';
                btn.style.background = '#34C759';
                if (markers[id]) {
                    markers[id].setStyle({ fillColor: getColor(status) });
                }
                setTimeout(() => map.closePopup(), 800);
            }
        };

        loadFountains();
    </script>
</body>
</html>
